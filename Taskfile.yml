version: "3"

vars:
  SERVICE: ssp-mobile-dev
  DC: docker compose

tasks:
  build:
    desc: Build dev Docker image
    cmds:
      - "{{.DC}} build"

  up:
    desc: Start dev container (detached)
    deps: [build]
    cmds:
      - "{{.DC}} up -d --force-recreate"

  shell:
    desc: Open shell in running container
    cmds:
      - |
        if [ -n "{{.CLI_ARGS}}" ]; then
          {{.DC}} exec {{.SERVICE}} bash -c {{.CLI_ARGS}}
        else
          {{.DC}} exec {{.SERVICE}} bash
        fi

  dev:
    desc: One command dev run (install + expo start)
    vars:
      PORT: '{{default "19000" .PORT}}'
    deps: [up]
    cmds:
      - "{{.DC}} exec --user root {{.SERVICE}} bash -lc 'chown -R 1000:1000 /home/node/.npm 2>/dev/null || true'"
      - "{{.DC}} exec --user root {{.SERVICE}} bash -lc 'chown -R 1000:1000 /workspace/node_modules /workspace/package-lock.json 2>/dev/null || true'"
      - "{{.DC}} exec {{.SERVICE}} bash -lc 'test -d node_modules || npm i'"
      - "{{.DC}} exec {{.SERVICE}} bash -lc 'npx expo start --lan --port {{.PORT}}'"

  sdk-list:
    desc: Print `sdkmanager --list`
    cmds:
      - "{{.DC}} exec {{.SERVICE}} bash -c 'sdkmanager --list'"

  sdk-install:
    desc: Install Android SDK packages (platform-tools, build-tools, platforms)
    cmds:
      - "{{.DC}} exec {{.SERVICE}} bash -c 'yes | sdkmanager --licenses >/dev/null'"
      - "{{.DC}} exec {{.SERVICE}} bash -c 'sdkmanager --update'"
      # Default set; adjust API/build-tools versions as needed.
      - "{{.DC}} exec {{.SERVICE}} bash -c 'sdkmanager \"platform-tools\" \"platforms;android-34\" \"build-tools;34.0.0\"'"

  doctor:
    desc: Check Java/SDK/adb tooling inside container
    cmds:
      - "{{.DC}} exec {{.SERVICE}} bash -c 'set -euo pipefail; echo ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT; echo; java -version; echo; sdkmanager --version; echo; (adb version || true); echo; ls -la $ANDROID_SDK_ROOT | head -n 50'"

  android-build:
    desc: Example Android build (if project exists)
    cmds:
      - "{{.DC}} exec {{.SERVICE}} bash -c 'if [ -x ./gradlew ]; then ./gradlew assembleDebug; elif [ -f package.json ]; then npx react-native build-android || npx react-native run-android; else echo \"No Android project detected (no gradlew/package.json).\"; fi'"
